[package]
name = "oxc_ex_nif"
version = "0.1.0"
edition = "2021"

[lib]
name = "oxc_ex_nif"
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37"
oxc_allocator = "0.117"
oxc_ast = { version = "0.117", features = ["serialize"] }
oxc_codegen = { version = "0.117", features = ["sourcemap"] }
oxc_diagnostics = "0.117"
oxc_minifier = "0.117"
oxc_parser = "0.117"
oxc_semantic = "0.117"
oxc_sourcemap = "6"
oxc_span = "0.117"
oxc_transformer = "0.117"
oxc_transformer_plugins = "0.117"
serde_json = "1"
